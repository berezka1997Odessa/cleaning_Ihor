  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

:1.2;\">Фіксована вартість<\u002Fdiv>\n          <div style=\"font-size:13px;color:#6E6A85;margin-top:2px;\">відома до початку робіт<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ SERVICES ============ -->\n<section id=\"services\" style=\"padding:clamp(56px,8vw,104px) 0;\">\n  <div style=\"width:min(1180px,92vw);margin:0 auto;\">\n    <div style=\"max-width:640px;margin-bottom:clamp(36px,5vw,56px);\">\n      <span style=\"display:block;font-size:13px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:#7C5CFC;margin-bottom:14px;\">Наші послуги<\u002Fspan>\n      <h2 style=\"font-size:clamp(28px,3.6vw,46px);font-weight:800;letter-spacing:-0.8px;line-height:1.08;\">Усе для чистоти вашого дому<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:22px;\">\n      <sc-for list=\"{{ services }}\" as=\"srv\" hint-placeholder-count=\"5\">\n        <div style=\"background:#fff;border:1px solid #EFEDF6;border-radius:clamp(14px,3vw,24px);padding:clamp(15px,3.6vw,30px);display:flex;flex-direction:column;box-shadow:0 4px 24px rgba(40,30,90,0.05);transition:transform .22s ease,box-shadow .25s ease,border-color .25s ease;\" style-hover=\"transform:translateY(-6px);box-shadow:0 20px 44px rgba(40,30,90,0.11);border-color:#E2DCFB;\">\n          <span style=\"width:clamp(28px,6vw,48px);height:clamp(28px,6vw,48px);border-radius:clamp(9px,1.8vw,14px);background:#EFEBFE;display:flex;align-items:center;justify-content:center;margin-bottom:clamp(11px,2.6vw,22px);\">\n            <span style=\"width:clamp(11px,2.2vw,18px);height:clamp(11px,2.2vw,18px);border-radius:5px;background:#7C5CFC;\"><\u002Fspan>\n          <\u002Fspan>\n          <h3 style=\"font-size:clamp(16px,2.6vw,21px);font-weight:800;letter-spacing:-0.3px;margin-bottom:clamp(5px,1.2vw,10px);\">{{ srv.title }}<\u002Fh3>\n          <p style=\"font-size:clamp(13px,1.9vw,15px);line-height:1.55;color:#6E6A85;flex:1;margin-bottom:clamp(11px,2.6vw,22px);\">{{ srv.desc }}<\u002Fp>\n          <div style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;\">\n            <div>\n              <span style=\"display:block;font-size:clamp(10px,1.5vw,12px);color:#9A96AD;font-weight:600;\">вартість<\u002Fspan>\n              <span style=\"font-size:clamp(15px,2.4vw,20px);font-weight:800;color:#18162A;\">{{ srv.price }}<\u002Fspan>\n            <\u002Fdiv>\n            <button type=\"button\" onclick=\"{{ scrollToCalc }}\" style=\"padding:clamp(8px,1.5vw,12px) clamp(13px,2.6vw,22px);border-radius:clamp(9px,1.6vw,13px);border:none;background:#EFEBFE;color:#7C5CFC;font-size:clamp(13px,1.9vw,15px);font-weight:700;cursor:pointer;transition:background .2s ease,color .2s ease,transform .15s ease;\" style-hover=\"background:#7C5CFC;color:#fff;transform:translateY(-2px);\" style-active=\"transform:translateY(0);\">Замовити<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ CALCULATOR ============ -->\n<section id=\"calc\" style=\"padding:clamp(56px,8vw,104px) 0;background:#F0EEFA;\">\n  <div style=\"width:min(1180px,92vw);margin:0 auto;\">\n    <div style=\"max-width:680px;margin-bottom:clamp(32px,4vw,48px);\">\n      <span style=\"display:block;font-size:13px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:#7C5CFC;margin-bottom:14px;\">Калькулятор<\u002Fspan>\n      <h2 style=\"font-size:clamp(28px,3.6vw,46px);font-weight:800;letter-spacing:-0.8px;line-height:1.08;margin-bottom:12px;\">Розрахуйте попередню вартість<\u002Fh2>\n      <p style=\"font-size:17px;color:#6E6A85;line-height:1.6;\">Оберіть параметри — і ціна оновиться миттєво.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-wrap:wrap;gap:24px;align-items:flex-start;\">\n      <!-- Controls -->\n      <div style=\"flex:1 1 500px;min-width:300px;background:#fff;border:1px solid #EAE7F4;border-radius:clamp(16px,3vw,26px);padding:clamp(14px,3vw,34px);box-shadow:0 6px 30px rgba(40,30,90,0.06);\">\n        <div style=\"margin-bottom:clamp(16px,3vw,28px);\">\n          <div style=\"font-size:clamp(11px,1.6vw,13px);font-weight:800;letter-spacing:0.4px;text-transform:uppercase;color:#18162A;margin-bottom:clamp(8px,1.6vw,13px);\">Тип прибирання<\u002Fdiv>\n          <div style=\"display:flex;flex-wrap:wrap;gap:clamp(7px,1.2vw,10px);\">\n            <sc-for list=\"{{ typeOpts }}\" as=\"opt\" hint-placeholder-count=\"3\"><button type=\"button\" onclick=\"{{ opt.onClick }}\" style=\"{{ opt.style }}\">{{ opt.label }}<\u002Fbutton><\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-bottom:clamp(16px,3vw,28px);\">\n          <div style=\"font-size:clamp(11px,1.6vw,13px);font-weight:800;letter-spacing:0.4px;text-transform:uppercase;color:#18162A;margin-bottom:clamp(8px,1.6vw,13px);\">Кількість кімнат<\u002Fdiv>\n          <div style=\"display:flex;flex-wrap:wrap;gap:clamp(7px,1.2vw,10px);\">\n            <sc-for list=\"{{ roomsOpts }}\" as=\"opt\" hint-placeholder-count=\"5\"><button type=\"button\" onclick=\"{{ opt.onClick }}\" style=\"{{ opt.style }}\">{{ opt.label }}<\u002Fbutton><\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:clamp(14px,2.6vw,24px);margin-bottom:clamp(16px,3vw,28px);\">\n          <div style=\"flex:1 1 200px;\">\n            <div style=\"font-size:clamp(11px,1.6vw,13px);font-weight:800;letter-spacing:0.4px;text-transform:uppercase;color:#18162A;margin-bottom:clamp(8px,1.6vw,13px);\">Санвузли<\u002Fdiv>\n            <div style=\"display:flex;flex-wrap:wrap;gap:clamp(7px,1.2vw,10px);\">\n              <sc-for list=\"{{ bathsOpts }}\" as=\"opt\" hint-placeholder-count=\"3\"><button type=\"button\" onclick=\"{{ opt.onClick }}\" style=\"{{ opt.style }}\">{{ opt.label }}<\u002Fbutton><\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:1 1 200px;\">\n            <div style=\"font-size:clamp(11px,1.6vw,13px);font-weight:800;letter-spacing:0.4px;text-transform:uppercase;color:#18162A;margin-bottom:clamp(8px,1.6vw,13px);\">Балкони<\u002Fdiv>\n            <div style=\"display:flex;flex-wrap:wrap;gap:clamp(7px,1.2vw,10px);\">\n              <sc-for list=\"{{ balcOpts }}\" as=\"opt\" hint-placeholder-count=\"4\"><button type=\"button\" onclick=\"{{ opt.onClick }}\" style=\"{{ opt.style }}\">{{ opt.label }}<\u002Fbutton><\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:clamp(11px,1.6vw,13px);font-weight:800;letter-spacing:0.4px;text-transform:uppercase;color:#18162A;margin-bottom:clamp(8px,1.6vw,13px);\">Додаткові послуги<\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px;\">\n            <sc-for list=\"{{ addonItems }}\" as=\"item\" hint-placeholder-count=\"4\">\n              <div onclick=\"{{ item.onClick }}\" style=\"{{ item.rowStyle }}\">\n                <span style=\"{{ item.boxStyle }}\">{{ item.check }}<\u002Fspan>\n                <span style=\"flex:1;font-size:15px;font-weight:600;color:#18162A;\">{{ item.label }}<\u002Fspan>\n                <span style=\"font-size:14px;font-weight:700;color:#7C5CFC;white-space:nowrap;\">{{ item.priceStr }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <!-- Result -->\n      <div style=\"flex:1 1 300px;min-width:280px;position:sticky;top:96px;\">\n        <div style=\"background:#7C5CFC;border-radius:26px;padding:clamp(26px,3vw,34px);box-shadow:0 20px 50px rgba(124,92,252,0.4);color:#fff;\">\n          <div style=\"font-size:14px;font-weight:600;opacity:0.85;margin-bottom:8px;\">Попередня вартість<\u002Fdiv>\n          <div style=\"font-size:clamp(36px,5vw,50px);font-weight:800;letter-spacing:-1px;line-height:1;\">{{ priceStr }}<\u002Fdiv>\n          <p style=\"font-size:14px;line-height:1.55;opacity:0.82;margin:18px 0 24px;\">Точну вартість підтвердить менеджер після уточнення деталей замовлення.<\u002Fp>\n          <button type=\"button\" onclick=\"{{ openOrder }}\" style=\"width:100%;padding:17px;border-radius:15px;border:none;background:#fff;color:#7C5CFC;font-size:17px;font-weight:800;cursor:pointer;transition:transform .15s ease,box-shadow .2s ease,background .2s ease;box-shadow:0 10px 24px rgba(20,10,60,0.22);\" style-hover=\"transform:translateY(-2px);box-shadow:0 16px 32px rgba(20,10,60,0.3);background:#FAF9FF;\" style-active=\"transform:translateY(0);\">Замовити прибирання<\u002Fbutton>\n          <div style=\"display:flex;align-items:center;gap:9px;margin-top:18px;font-size:13px;opacity:0.85;justify-content:center;\">\n            <span style=\"width:7px;height:7px;border-radius:50%;background:#fff;\"><\u002Fspan>Гарантія якості прибирання\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ TEAM ============ -->\n<section id=\"team\" style=\"padding:clamp(56px,8vw,104px) 0;\">\n  <div style=\"width:min(1180px,92vw);margin:0 auto;\">\n    <div style=\"max-width:640px;margin-bottom:clamp(36px,5vw,56px);\">\n      <span style=\"display:block;font-size:13px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:#7C5CFC;margin-bottom:14px;\">Наша команда<\u002Fspan>\n      <h2 style=\"font-size:clamp(28px,3.6vw,46px);font-weight:800;letter-spacing:-0.8px;line-height:1.08;\">Перевірені та досвідчені фахівці<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:24px;\">\n      <sc-for list=\"{{ team }}\" as=\"member\" hint-placeholder-count=\"3\">\n        <div style=\"background:#fff;border:1px solid #EFEDF6;border-radius:24px;padding:24px;box-shadow:0 4px 24px rg n style=\"color:#D6455D;\">*<\u002Fspan><\u002Flabel>\n        <input id=\"order-phone\" type=\"tel\" inputmode=\"tel\" autocomplete=\"tel\" placeholder=\"+380 (__) ___-__-__\" value=\"{{ orderPhone }}\" onchange=\"{{ onOrderPhone }}\" onfocus=\"{{ onOrderPhoneFocus }}\" style=\"{{ orderPhoneStyle }}\" style-focus=\"border-color:#7C5CFC;box-shadow:0 0 0 3px rgba(124,92,252,0.18);\">\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:7px;\">\n        <label for=\"order-address\" style=\"font-size:12.5px;font-weight:800;letter-spacing:0.4px;text-transform:uppercase;color:#18162A;\">Адреса<\u002Flabel>\n        <input id=\"order-address\" type=\"text\" autocomplete=\"street-address\" placeholder=\"Вулиця, будинок, квартира\" value=\"{{ orderAddress }}\" onchange=\"{{ onOrderAddress }}\" style=\"{{ orderInputStyle }}\" style-focus=\"border-color:#7C5CFC;box-shadow:0 0 0 3px rgba(124,92,252,0.18);\">\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:7px;\">\n        <label for=\"order-time\" style=\"font-size:12.5px;font-weight:800;letter-spacing:0.4px;text-transform:uppercase;color:#18162A;\">Бажаний час прибирання<\u002Flabel>\n        <input id=\"order-time\" type=\"text\" placeholder=\"Напр.: завтра о 10:00\" value=\"{{ orderTime }}\" onchange=\"{{ onOrderTime }}\" style=\"{{ orderInputStyle }}\" style-focus=\"border-color:#7C5CFC;box-shadow:0 0 0 3px rgba(124,92,252,0.18);\">\n      <\u002Fdiv>\n      <sc-if value=\"{{ orderError }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"font-size:13.5px;font-weight:600;color:#D6455D;\">{{ orderErrorText }}<\u002Fdiv>\n      <\u002Fsc-if>\n      <button type=\"submit\" style=\"width:100%;padding:15px;border-radius:14px;border:none;background:#7C5CFC;color:#fff;font-size:16px;font-weight:700;cursor:pointer;transition:transform .15s ease,box-shadow .2s ease,background .2s ease;box-shadow:0 10px 24px rgba(124,92,252,0.35);\" style-hover=\"background:#6A47F5;transform:translateY(-2px);\" style-active=\"transform:translateY(0);\">Замовити дзвінок<\u002Fbutton>\n      <p style=\"font-size:12px;color:#9A96AD;line-height:1.5;text-align:center;\">Надсилаючи форму, ви погоджуєтесь на обробку персональних даних.<\u002Fp>\n    <\u002Fform>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- thank-you popup -->\n<sc-if value=\"{{ leadSent }}\" hint-placeholder-val=\"{{ false }}\">\n  <div onclick=\"{{ closeLeadPopup }}\" style=\"position:fixed;inset:0;z-index:1000;background:rgba(24,22,42,0.55);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:20px;\">\n    <div onclick=\"{{ stopPop }}\" style=\"background:#fff;border-radius:26px;padding:clamp(28px,5vw,44px);max-width:440px;width:100%;text-align:center;box-shadow:0 40px 90px rgba(0,0,0,0.35);\">\n      <span style=\"display:flex;width:72px;height:72px;border-radius:50%;background:#EFEBFE;color:#7C5CFC;align-items:center;justify-content:center;font-size:34px;font-weight:800;margin:0 auto 20px;\">✓<\u002Fspan>\n      <h3 style=\"font-size:clamp(22px,3vw,27px);font-weight:800;letter-spacing:-0.5px;color:#18162A;margin-bottom:12px;\">Дякуємо за заявку!<\u002Fh3>\n      <p style=\"font-size:16px;color:#6E6A85;line-height:1.6;\">Ми зателефонуємо вам протягом <strong style=\"color:#18162A;\">30 хвилин<\u002Fstrong> у робочий час (08:00 – 22:00).<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ============ REVIEWS ============ -->\n<section id=\"reviews\" style=\"padding:clamp(56px,8vw,104px) 0;background:#F0EEFA;\">\n  <div style=\"width:min(1180px,92vw);margin:0 auto;\">\n    <div style=\"max-width:680px;margin-bottom:clamp(36px,5vw,56px);\">\n      <span style=\"display:block;font-size:13px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:#7C5CFC;margin-bottom:14px;\">Відгуки та результати<\u002Fspan>\n      <h2 style=\"font-size:clamp(28px,3.6vw,46px);font-weight:800;letter-spacing:-0.8px;li x;\">FAQ<\u002Fspan>\n      <h2 style=\"font-size:clamp(28px,3.6vw,46px);font-weight:800;letter-spacing:-0.8px;line-height:1.08;\">Поширені запитання<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:14px;\">\n      <sc-for list=\"{{ faqs }}\" as=\"f\" hint-placeholder-count=\"5\">\n        <div style=\"background:#fff;border:1px solid #EFEDF6;border-radius:18px;overflow:hidden;box-shadow:0 4px 18px rgba(40,30,90,0.04);transition:box-shadow .2s ease;\" style-hover=\"box-shadow:0 8px 26px rgba(40,30,90,0.08);\">\n          <button type=\"button\" onclick=\"{{ f.onClick }}\" style=\"width:100%;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:22px 26px;background:none;border:none;cursor:pointer;text-align:left;\">\n            <span style=\"font-size:17px;font-weight:700;color:#18162A;\">{{ f.q }}<\u002Fspan>\n            <span style=\"{{ f.iconStyle }}flex:0 0 auto;width:30px;height:30px;border-radius:9px;background:#EFEBFE;color:#7C5CFC;font-size:22px;display:flex;align-items:center;justify-content:center;line-height:1;\">+<\u002Fspan>\n          <\u002Fbutton>\n          <div style=\"{{ f.bodyStyle }}\">\n            <p style=\"padding:0 26px 24px;font-size:15.5px;line-height:1.65;color:#6E6A85;\">{{ f.a }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ FOOTER ============ -->\n<footer style=\"background:#18162A;color:#fff;padding:clamp(48px,6vw,72px) 0 32px;\">\n  <div style=\"width:min(1180px,92vw);margin:0 auto;\">\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:clamp(22px,4vw,36px);padding-bottom:clamp(24px,4vw,40px);\">\n      <div>\n        <div style=\"display:flex;align-items:center;gap:11px;margin-bottom:12px;\">\n          <span style=\"width:34px;height:34px;border-radius:11px;background:#7C5CFC;display:flex;align-items:center;justify-content:center;\"> const TAU = Math.PI * 2;\n    const R = Math.random;\n    // opaque soapy base\n    const base = ctx.createLinearGradient(0, 0, 0, h);\n    base.addColorStop(0, '#fbfcfe');\n    base.addColorStop(0.5, '#f1f4f9');\n    base.addColorStop(1, '#e7ebf3');\n    ctx.fillStyle = base;\n    ctx.fillRect(0, 0, w, h);\n    // soft depth shadows between foam mounds\n    for (let i = 0; i < 60; i++) {\n      const x = R() * w, y = R() * h, r = 50 + R() * 130;\n      const g = ctx.createRadialGradient(x, y, 0, x, y, r);\n      g.addColorStop(0, 'rgba(168,178,202,' + (0.05 + R() * 0.09).toFixed(3) + ')');\n      g.addColorStop(1, 'rgba(168,178,202,0)');\n      ctx.fillStyle = g;\n      ctx.beginPath(); ctx.arc(x, y, r, 0, TAU); ctx.fill();\n    }\n    // billowy light mounds\n    for (let i = 0; i < 80; i++) {\n      const x = R() * w, y = R() * h, r = 30 + R() * 90;\n      const g = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, 0, x, y, r);\n      g.addColorStop(0, 'rgba(255,255,255,' + (0.35 + R() * 0.45).toFixed(3) + ')');\n      g.addColorStop(1, 'rgba(255,255,255,0)');\n      ctx.fillStyle = g;\n      ctx.beginPath(); ctx.arc(x, y, r, 0, TAU); ctx.fill();\n    }\n    // individual bubbles with rims and highlights\n    const n = Math.max(160, Math.min(420, Math.round((w * h) / 5200)));\n    for (let i = 0; i < n; i++) {\n      const x = R() * w, y = R() * h, r = 2.5 + Math.pow(R(), 1.8) * 22;\n      const g = ctx.createRadialGradient(x, y, r * 0.15, x, y, r);\n      g.addColorStop(0, 'rgba(255,255,255,0.06)');\n      g.addColorStop(0.72, 'rgba(214,221,235,0.16)');\n      g.addColorStop(0.95, 'rgba(150,162,190,' + (0.16 + R() * 0.18).toFixed(3) + ')');\n      g.addColorStop(1, 'rgba(255,255,255,0.5)');\n      ctx.fillStyle = g;\n      ctx.beginPath(); ctx.arc(x, y, r, 0, TAU); ctx.fill();\n      ctx.fillStyle = 'rgba(255,255,255,' + (0.5 + R() * 0.4).toFixed(2) + ')';\n      ctx.beginPath(); ctx.arc(x - r * 0.35, y - r * 0.4, Math.max(0.8, r * 0.2), 0, TAU); ctx.fill();\n    }\n  }\n\n  startWash() {\n    const overlay = this._ovEl, foam = this._foamEl, cv = this._cvEl, sq = this._sqEl;\n    const sheen = this._sheenEl, dropsWrap = this._dropsEl;\n    if (!overlay || !foam || !cv || !sq) { this.endWash(); return; }\n    this.drawFoam(cv);\n    const H = overlay.clientHeight || window.innerHeight;\n    const SQH = 212;\n    // droplets + run streaks left behind on the \"glass\"\n    const drops = [];\n    if (dropsWrap) {\n      for (let i = 0; i < 12; i++) {\n        const el = document.createElement('div');\n        const streak = Math.random() < 0.45;\n        const x = 4 + Math.random() * 92;\n        const y = H * (0.12 + Math.random() * 0.78);\n        const s = 5 + Math.random() * 8;\n        el.style.cssText = 'position:absolute;opacity:0;pointer-events:none;left:' + x + '%;top:' + y + 'px;' +\n          (streak\n            ? 'width:3px;height:' + (34 + Math.random() * 60) + 'px;border-radius:3px;background:linear-gradient(180deg,rgba(255,255,255,.55),rgba(190,205,230,.28) 60%,rgba(255,255,255,0));'\n            : 'width:' + s + 'px;height:' + (s * 1.25) + 'px;border-radius:46% 54% 52% 48%/38% 40% 62% 60%;background:radial-gradient(circle at 34% 30%, rgba(255,255,255,.95) 0 18%, rgba(210,220,240,.55) 55%, rgba(150,165,200,.35));box-shadow:0 1px 2px rgba(80,95,130,.25);');\n        dropsWrap.appendChild(el);\n        drops.push({ el, y, shown: false });\n      }\n    }\n    const D0 = 280, ENTER = 260, EXIT = 240, Y_IN = 64;\n    const WIPE = Math.max(400, Number(this.props.wipeDurationMs) || 880);\n    const easeOut = t => 1 - Math.pow(1 - t, 3);\n    const easeInOut = t => (t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2);\n    const easeIn = t => t * t * t;\n    const start = performance.now();\n    const frame = (now) => {\n      if (this._washDone) return;\n      const t = now - start;\n      let y, sqOp = 1;\n      if (t < D0) { y = -90; }\n      else if (t < D0 + ENTER) { y = -90 + (Y_IN + 90) * easeOut((t - D0) / ENTER); }\n      else if (t < D0 + ENTER + WIPE) { y = Y_IN + (H - Y_IN) * easeInOut((t - D0 - ENTER) / WIPE); }\n      else {\n        const p = Math.min(1, (t - D0 - ENTER - WIPE) / EXIT);\n        y = H + (SQH + 90) * easeIn(p);\n        sqOp = 1 - p;\n      }\n      const clipY = Math.max(0, Math.min(H, y));\n      sq.style.transform = 'translate3d(0,' + (y - SQH) + 'px,0)';\n      sq.style.opacity = String(sqOp);\n      const clip = 'inset(' + clipY + 'px 0 0 0)';\n      foam.style.clipPath = clip;\n      foam.style.webkitClipPath = clip;\n      if (sheen) {\n        sheen.style.transform = 'translate3d(0,' + (clipY - 110) + 'px,0)';\n        sheen.style.opacity = String(0.9 * sqOp);\n      }\n      for (let i = 0; i < drops.length; i++) {\n        const d = drops[i];\n        if (!d.shown && y > d.y + 14) {\n          d.shown = true;\n          d.el.style.opacity = '0.9';\n          const el = d.el;\n          setTimeout(() => {\n            el.style.transition = 'opacity .42s ease, transform .42s ease';\n            el.style.opacity = '0';\n            el.style.transform = 'translateY(9px)';\n          }, 90 + Math.random() * 160);\n        }\n      }\n      if (t >= D0 + ENTER + WIPE + EXIT + 300) { this.endWash(); return; }\n      this._washRaf = requestAnimationFrame(frame);\n    };\n    this._washRaf = requestAnimationFrame(frame);\n  }\n\n  fmt(n) { return String(n).replace(/\\B(?=(\\d{3})+(?!\\d))/g, ' '); }\n\n  navClick = (e) => {\n    const href = (e.currentTarget.getAttribute('href') || '');\n    if (href.charAt(0) === '#') {\n      const el = document.getElementById(href.slice(1));\n      if (el) {\n        e.preventDefault();\n        window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 76, behavior: 'smooth' });\n      }\n    }\n    if (this.state.menuOpen) this.setState({ menuOpen: false });\n  };\n\n  scrollToCalc = () => {\n    const el = document.getElementById('calc');\n    if (el) window.scrollTo({ top: el.getBoundi
